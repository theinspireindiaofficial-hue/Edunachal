<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EduBharat">
  <defs>
    <linearGradient id="eb-ring" x1="20" y1="10" x2="100" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F47216"/>
      <stop offset="0.42" stop-color="#F0A000"/>
      <stop offset="0.62" stop-color="#2E9E44"/>
      <stop offset="1" stop-color="#1B3A9E"/>
    </linearGradient>
    <linearGradient id="eb-swirl" x1="40" y1="34" x2="82" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2456C8"/>
      <stop offset="1" stop-color="#12307E"/>
    </linearGradient>
  </defs>

  <!-- tricolor ring -->
  <circle cx="60" cy="60" r="55" stroke="url(#eb-ring)" stroke-width="4.5" fill="#FFFFFF"/>

  <!-- orange shield/home crest -->
  <path d="M60 22 L82 33 V52 L60 63 L38 52 V33 Z" fill="#F47216"/>

  <!-- white disc behind swirl -->
  <circle cx="60" cy="50" r="21" fill="#FFFFFF"/>

  <!-- blue spiral swirl -->
  <path d="M60 33
           C71 33 79 41 79 52
           C79 63 70 71 59 71
           C49 71 42 63 42 53
           C42 44 49 38 58 38
           C65 38 70 43 70 50
           C70 56 66 60 61 60"
        stroke="url(#eb-swirl)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <circle cx="60" cy="51" r="4" fill="#12307E"/>
</svg>
